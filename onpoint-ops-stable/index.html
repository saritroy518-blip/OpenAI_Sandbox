<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OnPoint Ops Stable</title>
<style>
:root{--bg:#f4f6f8;--ink:#111827;--muted:#667085;--nav:#0f172a;--card:#fff;--line:#e5e7eb;--blue:#2563eb;--green:#067647;--red:#b42318;--amber:#b54708}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:var(--nav);color:#fff;padding:16px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:10px;align-items:center;margin-bottom:18px}.logo{width:36px;height:36px;border-radius:12px;background:#fff;color:#111827;display:grid;place-items:center;font-weight:900}.brand small{display:block;color:#9ca3af}.nav button{width:100%;display:block;border:0;border-radius:10px;padding:11px 12px;margin:5px 0;text-align:left;background:#1f2937;color:#d1d5db;font-weight:800;cursor:pointer}.nav button.active,.nav button:hover{background:#fff;color:#111827}.main{padding:20px;max-width:1500px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.top h1{margin:0;font-size:28px}.top p{margin:4px 0 0;color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(16,24,40,.04)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.metric{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}.metric .label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase}.metric .val{font-size:25px;font-weight:950;margin-top:4px}.metric .sub{font-size:12px;color:var(--muted);margin-top:3px}label{font-size:12px;color:#475467;font-weight:850;display:block;margin-bottom:5px}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:10px;padding:10px;font:inherit;background:#fff}textarea{min-height:70px}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:end}.btn{border:0;border-radius:10px;padding:10px 13px;font-weight:900;cursor:pointer;background:#e5e7eb;color:#111827}.btn.primary{background:var(--blue);color:white}.btn.red{background:#fee4e2;color:var(--red)}.btn.green{background:#dcfae6;color:var(--green)}.btns{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none!important}.view{display:none}.view.active{display:block}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;background:white}th,td{padding:10px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;vertical-align:top}th{background:#f9fafb;font-size:11px;text-transform:uppercase;color:#475467}.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;background:#eff6ff;color:#1d4ed8}.pill.red{background:#fee4e2;color:var(--red)}.pill.green{background:#dcfae6;color:var(--green)}.pill.amber{background:#fef0c7;color:var(--amber)}.muted{color:var(--muted)}.warn{border-left:5px solid var(--amber)}.bad{border-left:5px solid var(--red)}.good{border-left:5px solid var(--green)}.mobilebar{display:none;background:#0f172a;color:white;padding:10px;position:sticky;top:0;z-index:20}.mobilebar button{float:right}.footer{margin-top:16px;color:#98a2b3;font-size:12px}.danger{color:var(--red);font-weight:900}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.mobilebar{display:block}.grid,.grid2,.form{grid-template-columns:1fr}.main{padding:12px}.top{display:block}.nav{display:none}.nav.open{display:block}}
</style>
</head>
<body>
<div class="mobilebar"><b>OnPoint Stable</b><button class="btn" onclick="toggleNav()">Menu</button></div>
<div class="app">
<aside class="side">
  <div class="brand"><div class="logo">OP</div><div><b>OnPoint Ops</b><small>Stable Reset</small></div></div>
  <div class="nav" id="nav"></div>
  <div class="footer">Local browser storage only. Do not upload PHI.</div>
</aside>
<main class="main">
  <div class="top"><div><h1 id="title">Dashboard</h1><p id="subtitle">Patients, scripts, revenue, gross profit, cost, and cash.</p></div><div class="btns"><button class="btn" onclick="exportAll()">Export Backup</button><button class="btn" onclick="document.getElementById('backupFile').click()">Import Backup</button><input id="backupFile" class="hidden" type="file" accept=".json" onchange="importBackup(event)"></div></div>
  <section id="dashboard" class="view active"></section>
  <section id="daily" class="view"></section>
  <section id="importer" class="view"></section>
  <section id="costs" class="view"></section>
  <section id="reconcile" class="view"></section>
  <section id="forecast" class="view"></section>
  <section id="people" class="view"></section>
  <section id="actions" class="view"></section>
  <section id="settings" class="view"></section>
</main>
</div>
<script>
const KEY='onpoint.ops.stable.v1';
const pages=[['dashboard','Dashboard'],['daily','Daily Entry'],['importer','Reliable Import'],['costs','Cost Ledger'],['reconcile','Reconcile'],['forecast','Forecast'],['people','People'],['actions','Actions'],['settings','Settings']];
const money=x=>(Number(x||0)<0?'-$':'$')+Math.abs(Math.round(Number(x||0))).toLocaleString();
const num=x=>Math.round(Number(x||0)).toLocaleString();
const pct=x=>isFinite(x)?Number(x).toFixed(1)+'%':'0.0%';
const today=()=>new Date().toISOString().slice(0,10);
const get=()=>{try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}};
const set=s=>{localStorage.setItem(KEY,JSON.stringify(s));render()};
function seed(){return{daily:{},imports:{pioneer:[],bank:[],sage:[],intacct:[],cash:[]},costs:[],people:[],actions:[],targets:{gpRx:40,costRx:10,fillRate:90,cashFloor:0}}}
function toast(m){alert(m)}
function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function n(x){return Number(String(x??'').replace(/[$,]/g,'').replace(/[()]/g,m=>m==='('?'-':''))||0}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));document.getElementById('title').textContent=pages.find(p=>p[0]===id)?.[1]||id;render();}
function toggleNav(){document.getElementById('nav').classList.toggle('open')}
function nav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button data-id="${p[0]}" onclick="show('${p[0]}')">${p[1]}</button>`).join('');document.querySelector('#nav button').classList.add('active')}
function field(id,label,type='number',val=''){return`<div><label>${label}</label><input id="${id}" type="${type}" value="${esc(val)}"></div>`}
function select(id,label,opts,val){return`<div><label>${label}</label><select id="${id}">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`}
function table(headers,rows){return`<div class="tablewrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${headers.length}" class="muted">No rows yet.</td></tr>`}</tbody></table></div>`}
function metric(l,v,s='',cls=''){return`<div class="metric ${cls}"><div class="label">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`}
function rowsLast(days){const s=get(),out=[];for(let i=days-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);out.push({date:k,...(s.daily[k]||{})})}return out}
function sum(rows,k){return rows.reduce((a,r)=>a+n(r[k]),0)}
function latest(rows,k){for(let i=rows.length-1;i>=0;i--)if(n(rows[i][k]))return n(rows[i][k]);return 0}
function calc(){const r=rowsLast(30),scripts=sum(r,'scriptsFilled'),received=sum(r,'scriptsReceived'),rev=sum(r,'revenue'),cogs=sum(r,'cogs'),gp=rev-cogs,cost=sum(r,'labor')+sum(r,'delivery')+sum(r,'storeOpex')+sum(r,'salesCost')+sum(r,'techCost')+sum(r,'corpCost')+sum(r,'debtService');return{scripts,received,rev,cogs,gp,cost,net:gp-cost,gpRx:scripts?gp/scripts:0,costRx:scripts?cost/scripts:0,fill:received?scripts/received*100:0,cash:latest(r,'cash'),patients:sum(r,'patients'),pa:latest(r,'paBacklog'),ds:latest(r,'dsOhRisk')}}
function renderDashboard(){const c=calc(),s=get();document.getElementById('dashboard').innerHTML=`<div class="grid">${metric('Scripts',num(c.scripts),'30 day filled')}${metric('Gross Profit',money(c.gp),'GP/Rx '+money(c.gpRx),c.gpRx>=s.targets.gpRx?'good':'warn')}${metric('Cost/Rx',money(c.costRx),'target '+money(s.targets.costRx),c.costRx<=s.targets.costRx?'good':'bad')}${metric('Net',money(c.net),'GP less tracked cost',c.net>=0?'good':'bad')}${metric('Fill Rate',pct(c.fill),'filled / received',c.fill>=s.targets.fillRate?'good':'warn')}${metric('Cash',money(c.cash),'latest')}${metric('PA Backlog',num(c.pa),'latest',c.pa?'warn':'good')}${metric('DSOH Risk',num(c.ds),'latest',c.ds?'warn':'good')}</div><div class="card"><h2>CEO Read</h2>${insights(c)}</div><div class="card"><h2>Recent Daily Entries</h2>${table(['Date','Scripts','Revenue','COGS','GP','Cash'],rowsLast(14).reverse().map(r=>[r.date,num(r.scriptsFilled),money(r.revenue),money(r.cogs),money(n(r.revenue)-n(r.cogs)),money(r.cash)]))}</div>`}
function insights(c){let a=[];if(c.gpRx<get().targets.gpRx)a.push('GP/Rx is below target. Look at payer mix, drug mix, rejects, and Lift opportunities.');if(c.costRx>get().targets.costRx)a.push('Cost/Rx is too high. Look at labor, delivery, and overhead attribution.');if(c.fill<get().targets.fillRate)a.push('Fill rate is leaking. Check PA, patient contact, payer rejects, and inventory.');if(c.pa)a.push('PA backlog needs queue ownership. Every stuck PA is GP waiting to become cash.');if(c.ds)a.push('DSOH risk means patients may gap therapy. Run refill rescue.');if(!a.length)a.push('No major red flags from entered data. Keep feeding the machine.');return `<ul>${a.map(x=>`<li>${x}</li>`).join('')}</ul>`}
function renderDaily(){const s=get(),d=document.getElementById('dailyDate')?.value||today(),r=s.daily[d]||{};document.getElementById('daily').innerHTML=`<div class="card"><div class="form">${field('dailyDate','Date','date',d)}${field('scriptsReceived','Scripts Received','number',r.scriptsReceived)}${field('scriptsFilled','Scripts Filled','number',r.scriptsFilled)}${field('patients','Patients','number',r.patients)}${field('revenue','Revenue','number',r.revenue)}${field('cogs','COGS','number',r.cogs)}${field('labor','Labor','number',r.labor)}${field('delivery','Delivery','number',r.delivery)}${field('storeOpex','Store Opex','number',r.storeOpex)}${field('salesCost','Sales Cost','number',r.salesCost)}${field('techCost','Tech Cost','number',r.techCost)}${field('corpCost','Corporate Cost','number',r.corpCost)}${field('debtService','Debt Service','number',r.debtService)}${field('cash','Cash','number',r.cash)}${field('ap','AP','number',r.ap)}${field('ar','AR','number',r.ar)}${field('paBacklog','PA Backlog','number',r.paBacklog)}${field('dsOhRisk','DSOH Risk','number',r.dsOhRisk)}${field('actionsCompleted','Actions Completed','number',r.actionsCompleted)}</div><br><button class="btn primary" onclick="saveDaily()">Save Daily Entry</button></div>`;document.getElementById('dailyDate').onchange=renderDaily}
function saveDaily(){const s=get(),d=document.getElementById('dailyDate').value;s.daily[d]={};['scriptsReceived','scriptsFilled','patients','revenue','cogs','labor','delivery','storeOpex','salesCost','techCost','corpCost','debtService','cash','ap','ar','paBacklog','dsOhRisk','actionsCompleted'].forEach(k=>s.daily[d][k]=n(document.getElementById(k).value));set(s);show('dashboard')}
function parseCSV(text){const rows=[];let row=[],cell='',q=false;for(let i=0;i<text.length;i++){let ch=text[i],nx=text[i+1];if(ch==='"'&&q&&nx==='"'){cell+='"';i++}else if(ch==='"')q=!q;else if(ch===','&&!q){row.push(cell);cell=''}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&nx==='\n')i++;row.push(cell);if(row.some(x=>String(x).trim()))rows.push(row);row=[];cell=''}else cell+=ch}row.push(cell);if(row.some(x=>String(x).trim()))rows.push(row);let h=(rows.shift()||[]).map(x=>x.trim());return rows.map(r=>Object.fromEntries(h.map((x,i)=>[x,r[i]??''])))}
function renderImporter(){document.getElementById('importer').innerHTML=`<div class="card"><div class="form">${select('importType','Import Type',['pioneer','bank','sage','intacct','cash','costs'],'pioneer')}<div><label>File CSV or JSON</label><input id="importFile" type="file" accept=".csv,.json,.txt"></div><div><button class="btn primary" onclick="previewImport()">Preview</button></div></div></div><div id="preview"></div>`}
let previewRows=[];async function previewImport(){const f=document.getElementById('importFile').files[0];if(!f)return toast('Choose a file');const t=await f.text();try{previewRows=f.name.toLowerCase().endsWith('.json')?normalizeJSON(JSON.parse(t)):parseCSV(t)}catch(e){return toast('Could not parse file')}let keys=[...new Set(previewRows.slice(0,20).flatMap(r=>Object.keys(r)))].slice(0,8);document.getElementById('preview').innerHTML=`<div class="card"><h2>Preview ${previewRows.length} rows</h2>${table(keys,previewRows.slice(0,20).map(r=>keys.map(k=>esc(r[k]))))}<br><button class="btn primary" onclick="saveImport()">Save Import</button></div>`}
function normalizeJSON(x){if(Array.isArray(x))return x;if(x.rows)return x.rows;if(x.data)return x.data;if(x.transactions)return x.transactions;return[x]}
function val(r,...names){for(let nm of names){let k=Object.keys(r).find(x=>x.toLowerCase().replaceAll(' ','').replaceAll('_','')===nm.toLowerCase().replaceAll(' ','').replaceAll('_',''));if(k)return r[k]}return''}
function saveImport(){const type=document.getElementById('importType').value,s=get();if(type==='costs'){previewRows.forEach(r=>s.costs.push(costRow(r,type)))}else{s.imports[type]=s.imports[type]||[];s.imports[type].push(...previewRows)}set(s);previewRows=[];show(type==='costs'?'costs':'importer')}
function costRow(r,source){let debit=n(val(r,'debit','withdrawal')),credit=n(val(r,'credit','deposit')),amount=n(val(r,'amount','transaction amount','net amount'));if(debit)amount=-Math.abs(debit);else if(credit)amount=Math.abs(credit);let memo=val(r,'memo','description','name','vendor','payee','merchant')||'';return{id:'c'+Date.now()+Math.random(),date:String(val(r,'date','transaction date','posting date')||today()).slice(0,10),source,vendor:val(r,'vendor','payee','merchant','name')||memo,memo,amount,costType:val(r,'costType','cost type')||'Unassigned',object:val(r,'object')||'Unassigned',team:val(r,'team')||'Unassigned',status:amount<0?'Unassigned':'Inflow'}}
function renderCosts(){const s=get(),rows=s.costs;document.getElementById('costs').innerHTML=`<div class="card"><div class="btns"><button class="btn primary" onclick="document.getElementById('costFile').click()">Import Costs</button><input id="costFile" class="hidden" type="file" accept=".csv,.json" onchange="importCostFile(event)"><button class="btn" onclick="bulkAssignCosts()">Bulk Assign Unassigned</button></div></div>${table(['Date','Vendor','Memo','Amount','Cost Type','Object','Team','Status','Edit'],rows.map((r,i)=>[r.date,esc(r.vendor),esc(r.memo),money(r.amount),esc(r.costType),esc(r.object),esc(r.team),r.status,`<button class="btn" onclick="editCost(${i})">Edit</button>`]))}`}
async function importCostFile(e){const f=e.target.files[0];if(!f)return;const t=await f.text();const rows=f.name.endsWith('.json')?normalizeJSON(JSON.parse(t)):parseCSV(t);const s=get();rows.forEach(r=>s.costs.push(costRow(r,'bank/sage')));set(s);show('costs')}
function editCost(i){const s=get(),r=s.costs[i];r.costType=prompt('Cost type',r.costType)||r.costType;r.object=prompt('Object/location/channel/team',r.object)||r.object;r.team=prompt('Team',r.team)||r.team;r.status='Mapped';set(s);show('costs')}
function bulkAssignCosts(){const s=get(),ct=prompt('Cost type for all unassigned outflows?','Other');if(!ct)return;const obj=prompt('Object/location/channel?','Corporate')||'Corporate';const team=prompt('Team?','Finance')||'Finance';s.costs.forEach(r=>{if(r.amount<0&&r.status==='Unassigned'){r.costType=ct;r.object=obj;r.team=team;r.status='Mapped'}});set(s);show('costs')}
function renderReconcile(){const s=get(),bank=s.imports.bank.concat(s.imports.cash).map(r=>costRow(r,'bank')).filter(r=>r.amount<0),sage=s.imports.sage.concat(s.imports.intacct).map(r=>costRow(r,'sage')).filter(r=>r.amount<0),ledger=s.costs.filter(r=>r.amount<0),un=s.costs.filter(r=>r.amount<0&&r.status==='Unassigned');document.getElementById('reconcile').innerHTML=`<div class="grid">${metric('Bank Outflows',money(bank.reduce((a,r)=>a+Math.abs(r.amount),0)),bank.length+' rows')}${metric('Sage Outflows',money(sage.reduce((a,r)=>a+Math.abs(r.amount),0)),sage.length+' rows')}${metric('Cost Ledger',money(ledger.reduce((a,r)=>a+Math.abs(r.amount),0)),ledger.length+' rows')}${metric('Unassigned',money(un.reduce((a,r)=>a+Math.abs(r.amount),0)),un.length+' rows',un.length?'bad':'good')}</div><div class="card"><h2>Unassigned Costs</h2>${table(['Date','Vendor','Amount','Memo'],un.map(r=>[r.date,esc(r.vendor),money(r.amount),esc(r.memo)]))}</div>`}
function renderForecast(){const c=calc(),weeks=[];let cash=c.cash;for(let i=1;i<=13;i++){let scripts=Math.round(c.scripts/30*7),gp=scripts*c.gpRx,cost=scripts*c.costRx,net=gp-cost;cash+=net;weeks.push(['Week '+i,num(scripts),money(gp),money(cost),money(net),money(cash)])}document.getElementById('forecast').innerHTML=`<div class="card"><h2>13 Week Simple Forecast</h2>${table(['Week','Scripts','GP','Cost','Net','Ending Cash'],weeks)}</div>`}
function renderPeople(){const s=get();document.getElementById('people').innerHTML=`<div class="card"><div class="form">${field('pname','Name','text')}${field('prole','Role','text')}${field('pteam','Team','text')}<div><button class="btn primary" onclick="addPerson()">Add Person</button></div></div></div>${table(['Name','Role','Team','Delete'],s.people.map((p,i)=>[esc(p.name),esc(p.role),esc(p.team),`<button class="btn red" onclick="delPerson(${i})">Delete</button>`]))}`}
function addPerson(){const s=get();s.people.push({name:document.getElementById('pname').value,role:document.getElementById('prole').value,team:document.getElementById('pteam').value});set(s);show('people')}
function delPerson(i){const s=get();s.people.splice(i,1);set(s);show('people')}
function renderActions(){const s=get();document.getElementById('actions').innerHTML=`<div class="card"><div class="form">${field('atitle','Action','text')}${select('aowner','Owner',['Unassigned'].concat(s.people.map(p=>p.name)),'Unassigned')}${select('apriority','Priority',['High','Medium','Low'],'Medium')}<div><button class="btn primary" onclick="addAction()">Add Action</button></div></div></div>${table(['Action','Owner','Priority','Status','Done'],s.actions.map((a,i)=>[esc(a.title),esc(a.owner),a.priority,a.status,`<button class="btn green" onclick="doneAction(${i})">Done</button>`]))}`}
function addAction(){const s=get();s.actions.push({title:document.getElementById('atitle').value,owner:document.getElementById('aowner').value,priority:document.getElementById('apriority').value,status:'Open'});set(s);show('actions')}
function doneAction(i){const s=get();s.actions[i].status='Done';set(s);show('actions')}
function renderSettings(){const s=get();document.getElementById('settings').innerHTML=`<div class="card"><h2>Targets</h2><div class="form">${field('tgpRx','Target GP/Rx','number',s.targets.gpRx)}${field('tcostRx','Target Cost/Rx','number',s.targets.costRx)}${field('tfill','Target Fill Rate','number',s.targets.fillRate)}${field('tcash','Cash Floor','number',s.targets.cashFloor)}</div><br><button class="btn primary" onclick="saveSettings()">Save Targets</button></div><div class="card bad"><h2>Reset</h2><p class="muted">This clears only this Stable Reset app data.</p><button class="btn red" onclick="resetApp()">Clear Stable App Data</button></div>`}
function saveSettings(){const s=get();s.targets={gpRx:n(document.getElementById('tgpRx').value),costRx:n(document.getElementById('tcostRx').value),fillRate:n(document.getElementById('tfill').value),cashFloor:n(document.getElementById('tcash').value)};set(s);show('dashboard')}
function exportAll(){let blob=new Blob([JSON.stringify(get(),null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='onpoint-stable-backup-'+today()+'.json';a.click()}
async function importBackup(e){const f=e.target.files[0];if(!f)return;const txt=await f.text();localStorage.setItem(KEY,txt);render();show('dashboard')}
function resetApp(){if(confirm('Clear stable app data?')){localStorage.removeItem(KEY);render();show('dashboard')}}
function render(){renderDashboard();renderDaily();renderImporter();renderCosts();renderReconcile();renderForecast();renderPeople();renderActions();renderSettings()}
nav();render();
</script>
</body>
</html>
